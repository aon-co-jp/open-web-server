name: Release binaries

# タグ(例: v0.1.0)をpushすると、Linux(x86_64-unknown-linux-gnu)・
# Windows(x86_64)向けにビルドし、GitHub Releasesへ添付する。
#
# **正直な開示**: このクレートはTLS(rustls)・QUIC(quinn)・ACME(ring)を
# 含み、これらのcrateはmuslターゲットでのビルドが不安定になりやすい
# (RS-Chiketto等の依存が軽いプロジェクトとは異なり、あえてmusl静的
# リンクは狙わず、Ubuntu LTSのglibcを基準としたgnuターゲットを使う)。
# gnuターゲットのバイナリは、Ubuntu 20.04以降・Debian 11以降・
# AlmaLinux 8以降・Fedora等、比較的新しいglibcを持つディストリでは
# そのまま動くが、非常に古いディストリでは動かない可能性がある
# (完全な「全ディストリ共通の1バイナリ」ではない、muslとのトレードオフ)。

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (glibc, Ubuntu/Debian/AlmaLinux/Fedora等の比較的新しいディストリ向け)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # open-web-server-wireがRS-SmartTCPをpath依存(../../../RS-SmartTCP、
      # リポジトリルートの1つ上)で参照しているため、CI環境でも同じ
      # 相対位置(`$GITHUB_WORKSPACE`の1つ上=`../RS-SmartTCP`)にsibling
      # リポジトリをcheckoutする(2026-07-23、v0.1.0タグでの初回リリースで
      # 発覚したビルド失敗の修正)。
      - name: Checkout RS-SmartTCP (sibling path dependency)
        run: git clone --depth=1 https://github.com/aon-co-jp/RS-SmartTCP.git ../RS-SmartTCP
      - name: Build
        run: cargo build --release --bin open-web-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/open-web-server dist/open-web-server
          cp install.sh dist/install.sh
          tar -czf open-web-server-linux-x86_64.tar.gz -C dist open-web-server install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: open-web-server-linux-x86_64
          path: open-web-server-linux-x86_64.tar.gz

  build-windows:
    name: Windows (x86_64、Windows Server含む)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout RS-SmartTCP (sibling path dependency)
        run: git clone --depth=1 https://github.com/aon-co-jp/RS-SmartTCP.git ../RS-SmartTCP
      - name: Build
        run: cargo build --release --bin open-web-server
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/open-web-server.exe dist/
          Copy-Item install.ps1 dist/
          Compress-Archive -Path dist/* -DestinationPath open-web-server-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: open-web-server-windows-x86_64
          path: open-web-server-windows-x86_64.zip

  build-android:
    name: Android (APK, デバッグビルド, ARM64/x86_64)
    runs-on: ubuntu-latest
    # 正直な開示(2026-07-24追加): このジョブが実際にCI上のubuntu-latest
    # ランナーで動作するかは、本コミット時点のCI実行1回のみでしか確認
    # できていない可能性が高い。Android SDK/NDKはubuntu-latestランナーに
    # 標準搭載されていないため、android-actions/setup-android等のセット
    # アップが必要になり、cargo ndkによるRustのクロスビルド+Gradleの
    # assembleDebugという2段構成はローカル(このリポジトリの開発機)では
    # 実績があるが、CI環境固有の問題(NDKバージョン不一致・ネットワーク
    # 制限等)が起きても本パスでは深追いしない方針とする。失敗した場合は
    # このジョブのログを見て次回セッションで修正すること(Linux/Windows
    # ジョブの成功には影響しない、`continue-on-error: true`で全体の
    # リリース失敗を防ぐ)。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Checkout RS-SmartTCP (sibling path dependency)
        run: git clone --depth=1 https://github.com/aon-co-jp/RS-SmartTCP.git ../RS-SmartTCP
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"
      - name: Install Rust Android targets + cargo-ndk
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android
          cargo install cargo-ndk
      - name: Build Rust binary for Android (arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006
        run: |
          cargo ndk -t aarch64-linux-android build --release --bin open-web-server
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/open-web-server android/app/src/main/jniLibs/arm64-v8a/libopenwebserver.so
      - name: Build Rust binary for Android (x86_64)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.1.12297006
        run: |
          cargo ndk -t x86_64-linux-android build --release --bin open-web-server
          mkdir -p android/app/src/main/jniLibs/x86_64
          cp target/x86_64-linux-android/release/open-web-server android/app/src/main/jniLibs/x86_64/libopenwebserver.so
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk open-web-server-android-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: open-web-server-android-debug
          path: open-web-server-android-debug.apk

  release:
    name: GitHub Releaseへ添付
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' }}
    steps:
      - uses: actions/download-artifact@v4
      - name: List downloaded artifacts (Android job may have failed, see build-android logs)
        run: find . -maxdepth 2
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            open-web-server-linux-x86_64/open-web-server-linux-x86_64.tar.gz
            open-web-server-windows-x86_64/open-web-server-windows-x86_64.zip
            open-web-server-android-debug/open-web-server-android-debug.apk
          fail_on_unmatched_files: false
