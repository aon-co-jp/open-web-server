name: Release binaries

# タグ(例: v0.1.0)をpushすると、Linux(x86_64-unknown-linux-gnu)・
# Windows(x86_64)向けにビルドし、GitHub Releasesへ添付する。
#
# **正直な開示**: このクレートはTLS(rustls)・QUIC(quinn)・ACME(ring)を
# 含み、これらのcrateはmuslターゲットでのビルドが不安定になりやすい
# (RS-Chiketto等の依存が軽いプロジェクトとは異なり、あえてmusl静的
# リンクは狙わず、Ubuntu LTSのglibcを基準としたgnuターゲットを使う)。
# gnuターゲットのバイナリは、Ubuntu 20.04以降・Debian 11以降・
# AlmaLinux 8以降・Fedora等、比較的新しいglibcを持つディストリでは
# そのまま動くが、非常に古いディストリでは動かない可能性がある
# (完全な「全ディストリ共通の1バイナリ」ではない、muslとのトレードオフ)。

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux (glibc, Ubuntu/Debian/AlmaLinux/Fedora等の比較的新しいディストリ向け)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # open-web-server-wireがRS-SmartTCPをpath依存(../../../RS-SmartTCP、
      # リポジトリルートの1つ上)で参照しているため、CI環境でも同じ
      # 相対位置(`$GITHUB_WORKSPACE`の1つ上=`../RS-SmartTCP`)にsibling
      # リポジトリをcheckoutする(2026-07-23、v0.1.0タグでの初回リリースで
      # 発覚したビルド失敗の修正)。
      - uses: actions/checkout@v4
        with:
          repository: aon-co-jp/RS-SmartTCP
          path: ../RS-SmartTCP
      - name: Build
        run: cargo build --release --bin open-web-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/open-web-server dist/open-web-server
          cp install.sh dist/install.sh
          tar -czf open-web-server-linux-x86_64.tar.gz -C dist open-web-server install.sh
      - uses: actions/upload-artifact@v4
        with:
          name: open-web-server-linux-x86_64
          path: open-web-server-linux-x86_64.tar.gz

  build-windows:
    name: Windows (x86_64、Windows Server含む)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: aon-co-jp/RS-SmartTCP
          path: ../RS-SmartTCP
      - name: Build
        run: cargo build --release --bin open-web-server
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/open-web-server.exe dist/
          Copy-Item install.ps1 dist/
          Compress-Archive -Path dist/* -DestinationPath open-web-server-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: open-web-server-windows-x86_64
          path: open-web-server-windows-x86_64.zip

  release:
    name: GitHub Releaseへ添付
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            open-web-server-linux-x86_64/open-web-server-linux-x86_64.tar.gz
            open-web-server-windows-x86_64/open-web-server-windows-x86_64.zip
